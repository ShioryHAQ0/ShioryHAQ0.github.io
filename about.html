<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Collage Eye</title>
    <style>
        :root {
            --bg-color: #030305;
            --neon-glow: #00f3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #11111a 0%, #030305 70%);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Container keeping the layers aligned */
        .eye-assemblage {
            position: relative;
            width: 550px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- LAYER 1: CLIMBING TEXT RUNNING BEHIND/AROUND --- */
        .text-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            animation: spinText 40s linear infinite;
        }

        .text-ring svg {
            width: 100%;
            height: 100%;
        }

        .text-ring text {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 5px;
            fill: #ffffff;
            opacity: 0.8;
            text-shadow: 0 0 8px var(--neon-glow);
            text-transform: uppercase;
        }

        /* --- LAYER 2: THE STATIONARY EYE FRAME --- */
        .eye-frame {
            position: absolute;
            width: 420px;
            height: 420px;
            z-index: 3; /* Placed in front of the iris to clip/frame it naturally */
            pointer-events: none; /* Allows mouse tracking to pass through it */
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.9));
        }

        .eye-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- LAYER 3: THE TRACKING NEON IRIS --- */
        .iris-box {
            position: absolute;
            width: 180px;
            height: 180px;
            z-index: 2; /* Sits behind the frame so its borders stay hidden */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
        }

        .iris-box img {
            width: 105%;
            height: 105%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px #ff007f);
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        /* --- ANIMATIONS --- */
        @keyframes spinText {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 10px #ff007f) brightness(1); }
            100% { filter: drop-shadow(0 0 25px #00f3ff) brightness(1.2); }
        }

        /* --- BIO DETAILS PANEL --- */
        .bio-overlay {
            position: absolute;
            bottom: -50px;
            text-align: center;
            width: 100%;
        }

        .bio-overlay h1 {
            font-size: 1.2rem;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 8px;
        }

        .bio-overlay p {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="eye-assemblage">
        
        <div class="text-ring">
            <svg viewBox="0 0 550 550">
                <path id="archivePath" d="M 275,275 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" fill="none" />
                <text>
                    <textPath href="#archivePath" startOffset="0%">
                        • ARCHIVE ENTRY 0402 // THE OBSERVER IS THE OBSERVED • UNKNOWN REALMS AWAIT • DIGITAL MYSTIQUE • 
                    </textPath>
                </text>
            </svg>
        </div>

        <div class="iris-box" id="movingIris">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/9447978454826881050_0" alt="Fluorescent Iris">
        </div>

        <div class="eye-frame">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/475129861398242301_0" alt="Surreal Eye Frame">
        </div>

        <div class="bio-overlay">
            <h1>WELCOME TO THE CORE</h1>
            <p>[ INDEPENDENT DESIGN & PROTOCOLS ]</p>
        </div>

    </div>

    <script>
        const irisBox = document.getElementById('movingIris');
        const container = document.querySelector('.eye-assemblage');

        document.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            
            // Core coordinate of the assemblage center
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;
            
            // Distance vectors from cursor
            const deltaX = e.clientX - eyeX;
            const deltaY = e.clientY - eyeY;
            
            const angle = Math.atan2(deltaY, deltaX);
            
            // Constrain maximum track distance so it doesn't leave the eye socket asset
            const maxTrack = 35; 
            const pullForce = Math.min(maxTrack, Math.hypot(deltaX, deltaY) / 12);
            
            const moveX = Math.cos(angle) * pullForce;
            const moveY = Math.sin(angle) * pullForce;
            
            irisBox.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Center smoothly when mouse departs
        document.addEventListener('mouseleave', () => {
            irisBox.style.transform = 'translate(0px, 0px)';
        });
    </script>
</body>
</html>
