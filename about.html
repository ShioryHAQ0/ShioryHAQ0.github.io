<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◆ retro_futurism_manifesto.exe ◆</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --win-gray: #c0c0c0;
            --win-dark: #808080;
            --bg-dark: #0b0214;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            /* Classic retro-futuristic stars/grid vibe */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            font-family: "MS Sans Serif", Geneva, sans-serif, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #000;
        }

        /* --- BACKGROUND COLLAGE LAYER --- */
        .grid-floor {
            position: fixed;
            bottom: -5%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1200px;
            height: 40vh;
            object-fit: cover;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        /* --- THE RETRO OS WINDOW CONTAINING THE EYE --- */
        .window-container {
            position: relative;
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff #555 #555 #fff;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.5);
            width: 600px;
            padding: 4px;
            z-index: 5;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .title-bar-controls span {
            display: inline-block;
            width: 16px;
            height: 14px;
            background: var(--win-gray);
            border: 1px solid;
            border-color: #fff #555 #555 #fff;
            color: black;
            text-align: center;
            line-height: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 2px;
        }

        /* Interactive workspace inside the OS window */
        .window-body {
            background: #000;
            border: 2px inset #fff;
            height: 520px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- FOREGROUND COLLAGE ELEMENTS --- */
        .collage-palm {
            position: absolute;
            bottom: -30px;
            left: -40px;
            width: 180px;
            height: auto;
            transform: rotate(25deg);
            z-index: 6;
            filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.5)) hue-rotate(45deg);
            pointer-events: none;
        }

        .ui-sticker {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--neon-cyan);
            border: 1px dashed var(--neon-cyan);
            padding: 4px 8px;
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 6;
        }

        /* --- THE TRACKING EYE ASSEMBLAGE --- */
        .eye-assemblage {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Running Text Circular Ring */
        .text-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            animation: spinText 30s linear infinite;
        }

        .text-ring svg {
            width: 100%;
            height: 100%;
        }

        .text-ring text {
            font-size: 10px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 4px;
            fill: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            text-transform: uppercase;
        }

        /* The Outer Eye Shell (Stationary) */
        .eye-frame {
            position: absolute;
            width: 340px;
            height: 340px;
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.4));
        }

        .eye-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* The Fluorescent Tracking Iris */
        .iris-box {
            position: absolute;
            width: 140px;
            height: 140px;
            z-index: 3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
        }

        .iris-box img {
            width: 105%;
            height: 105%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--neon-cyan)) saturate(2);
        }

        /* --- FOOTER / BIO STAMP --- */
        .bio-stamp {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            color: #fff;
            font-size: 10px;
            line-height: 1.5;
            letter-spacing: 1px;
            z-index: 6;
            background: rgba(0,0,0,0.7);
            padding: 6px;
            border-left: 2px solid var(--neon-pink);
        }

        /* --- ANIMATIONS --- */
        @keyframes spinText {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <img src="http://googleusercontent.com/image_collection/image_retrieval/17005040607178714213_0" class="grid-floor" alt="Cyber Grid">

    <div class="window-container">
        <div class="title-bar">
            <span>👁️ human_interface_v1.03.exe</span>
            <div class="title-bar-controls">
                <span>_</span>
                <span>🗖</span>
                <span>X</span>
            </div>
        </div>
        
        <div class="window-body">
            
            <img src="http://googleusercontent.com/image_collection/image_retrieval/17680588290781212085_0" class="collage-palm" alt="Aesthetic Palm Accent">

            <div class="ui-sticker">SYS.STATUS: ONLINE</div>

            <div class="eye-assemblage">
                
                <div class="text-ring">
                    <svg viewBox="0 0 450 450">
                        <path id="retroPath" d="M 225,225 m -170,0 a 170,170 0 1,1 340,0 a 170,170 0 1,1 -340,0" fill="none" />
                        <text>
                            <textPath href="#retroPath" startOffset="0%">
                                • MILLENNIAL NOSTALGIA • RETRO FUTURISM PROTOCOL • THE EYE WATCHES ALL • NO DATA LOST • 
                            </textPath>
                        </text>
                    </svg>
                </div>

                <div class="iris-box" id="retroIris">
                    <img src="http://googleusercontent.com/image_collection/image_retrieval/9447978454826881050_0" alt="Fluorescent Iris">
                </div>

                <div class="eye-frame">
                    <img src="http://googleusercontent.com/image_collection/image_retrieval/475129861398242301_0" alt="Surreal Eye Cutout">
                </div>

            </div>

            <div class="bio-stamp">
                <span style="color: var(--neon-cyan);">USER // ID_992x</span><br>
                DESIGN & MYSTICISM<br>
                EST. 199X // MILLENNIAL CORE
            </div>

        </div>
    </div>

    <script>
        const iris = document.getElementById('retroIris');
        const container = document.querySelector('.eye-assemblage');

        document.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            
            // Calculate absolute center of the tracking zone
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;
            
            const deltaX = e.clientX - eyeX;
            const deltaY = e.clientY - eyeY;
            
            const angle = Math.atan2(deltaY, deltaX);
            
            // Subtle offset limits matching retro window boundaries
            const maxTrack = 28; 
            const pullForce = Math.min(maxTrack, Math.hypot(deltaX, deltaY) / 14);
            
            const moveX = Math.cos(angle) * pullForce;
            const moveY = Math.sin(angle) * pullForce;
            
            iris.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        document.addEventListener('mouseleave', () => {
            iris.style.transform = 'translate(0px, 0px)';
        });
    </script>
</body>
</html>
