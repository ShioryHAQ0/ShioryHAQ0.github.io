<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◆ retro_futurism_manifesto.exe ◆</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --win-gray: #c0c0c0;
            --win-dark: #808080;
            --bg-dark: #0b0214;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            /* Retro vaporwave grid pattern built with pure CSS */
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 0 20px, var(--bg-dark) 20px),
                linear-gradient(90deg, rgba(255, 0, 127, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(255, 0, 127, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 25px 25px, 25px 25px;
            font-family: "MS Sans Serif", Geneva, sans-serif, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #000;
        }

        /* --- THE RETRO OS WINDOW CONTAINING THE EYE --- */
        .window-container {
            position: relative;
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff #555 #555 #fff;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.6);
            width: 600px;
            padding: 4px;
            z-index: 5;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .title-bar-controls span {
            display: inline-block;
            width: 16px;
            height: 14px;
            background: var(--win-gray);
            border: 1px solid;
            border-color: #fff #555 #555 #fff;
            color: black;
            text-align: center;
            line-height: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 2px;
        }

        /* Workspace inside the OS window */
        .window-body {
            background: #020208;
            border: 2px inset #fff;
            height: 520px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- FOREGROUND COLLAGE ELEMENTS --- */
        .collage-palm {
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 140px;
            height: auto;
            z-index: 6;
            opacity: 0.85;
            filter: drop-shadow(3px 3px 0px #000) hue-rotate(140deg) saturate(2);
            pointer-events: none;
        }

        .ui-sticker {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--neon-cyan);
            border: 1px dashed var(--neon-cyan);
            padding: 4px 8px;
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 6;
        }

        /* --- THE TRACKING EYE ASSEMBLAGE --- */
        .eye-assemblage {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Running Text Circular Ring */
        .text-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            animation: spinText 30s linear infinite;
        }

        .text-ring svg {
            width: 100%;
            height: 100%;
        }

        .text-ring text {
            font-size: 11px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 5px;
            fill: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            text-transform: uppercase;
        }

        /* The Outer Eye Shell (Stationary cutout overlay) */
        .eye-frame {
            position: absolute;
            width: 320px;
            height: 320px;
            z-index: 4;
            pointer-events: none;
        }

        .eye-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Inverts a standard black graphic to neon cyber-white */
            filter: invert(1) drop-shadow(0 0 15px var(--neon-cyan));
        }

        /* The Fluorescent Tracking Iris */
        .iris-box {
            position: absolute;
            width: 160px;
            height: 160px;
            z-index: 3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
        }
